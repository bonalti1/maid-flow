<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#16284C" />
  <title>South Texas Builders — Quote Check</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="apple-touch-icon" href="/icon-192.png" />
  <link rel="stylesheet" href="/theme.css" />
  <link rel="stylesheet" href="/snap.css" />
</head>
<body>
  <div class="wrap">

    <!-- HOME: pick account -> upload -> line-by-line check vs that account's baseline -->
    <section id="screen-home" class="hero">
      <img class="hero-logo" src="/logo-portero.png" alt="El Portero — South Texas Builders" />
      <h1>Check a Quote</h1>
      <p class="sub">Pick the house and what it's for, upload the quote, and we check every line against your baseline.</p>

      <label class="step-label"><span class="num">1</span> Which house?</label>
      <select id="houseSelect" class="account-select">
        <option value="">Choose a house…</option>
      </select>

      <label class="step-label"><span class="num">2</span> What is this for?</label>
      <select id="accountSelect" class="account-select">
        <option value="">Choose an account…</option>
      </select>

      <div id="baselineRow" class="baseline-row" hidden>
        <span id="baselineStatus" class="muted small"></span>
        <label class="link" id="attachBaselineBtn">attach / replace price list
          <input id="baselineFile" type="file" accept=".xlsx,.xls,.csv" hidden />
        </label>
      </div>

      <label class="step-label"><span class="num">3</span> Upload the quote</label>
      <div class="big-actions">
        <button class="snap-btn" id="takePhoto"><span class="ico">📷</span> Take Photo</button>
        <button class="snap-btn secondary" id="uploadFile"><span class="ico">📎</span> Upload a File</button>
      </div>
      <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
      <input id="fileInput" type="file" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.csv,.xlsx,.xls" hidden />

      <div id="aiBanner" class="ai-banner" hidden></div>
      <a class="recent-link" href="/dashboard.html">📊 Open Office Dashboard →</a>
    </section>

    <!-- WORKING -->
    <section id="screen-working" class="working" hidden>
      <div class="goalie-scene">
        <video class="goalie-vid" src="/goalie.mp4" autoplay muted loop playsinline
               aria-label="South Texas Builders goalie making a save"></video>
      </div>
      <h2 id="workingMsg">Reading the quote…</h2>
      <p class="muted">🧤 Our goalie is blocking overcharges…</p>
    </section>

    <!-- RESULT -->
    <section id="screen-result" hidden>
      <div id="verdict" class="verdict good">
        <div class="vico" id="verdictIco">✅</div>
        <h2 id="verdictTitle">Looks Good</h2>
        <div class="amount" id="verdictAmount" hidden></div>
        <p id="verdictSub"></p>
      </div>

      <div class="inv-meta" id="invMeta"></div>
      <div class="okline" id="okLine" hidden></div>
      <div class="flag-list" id="flagList"></div>

      <div id="overSummary" class="over-summary" hidden></div>
      <div id="invoiceMsgBtns" class="invoice-msg-btns" hidden>
        <button class="btn btn-red" id="genWhatsapp">📲 Generate WhatsApp message</button>
        <button class="btn btn-navy" id="genEmail">✉️ Generate email</button>
      </div>

      <div class="result-actions">
        <button class="btn btn-navy btn-lg btn-block" id="checkAnother">📷 Check Another Quote</button>
        <a class="btn btn-ghost btn-block" href="/dashboard.html">View in Office Dashboard</a>
      </div>
    </section>
  </div>

  <!-- message bottom-sheet -->
  <div id="msgSheet" class="sheet-back" hidden>
    <div class="sheet">
      <h3>Message the vendor</h3>
      <p class="muted small" id="msgFor"></p>
      <div class="tabs">
        <button class="tab active" data-tab="wa">📲 Text / WhatsApp</button>
        <button class="tab" data-tab="email">✉️ Email</button>
      </div>
      <div id="pane-wa">
        <textarea id="waBody" rows="8"></textarea>
        <div class="send-row">
          <button class="btn" data-copy="waBody">Copy</button>
          <a id="waSend" class="btn btn-navy" target="_blank">Open in WhatsApp</a>
        </div>
      </div>
      <div id="pane-email" hidden>
        <label class="fld">Subject</label>
        <input id="emailSubject" />
        <label class="fld">Message</label>
        <textarea id="emailBody" rows="9"></textarea>
        <div class="send-row">
          <button class="btn" data-copy="emailBody">Copy</button>
          <a id="emailSend" class="btn btn-navy">Open Email</a>
        </div>
      </div>
      <button class="btn btn-ghost btn-block" id="closeSheet" style="margin-top:.8rem">Close</button>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script src="/snap.js"></script>
</body>
</html>
